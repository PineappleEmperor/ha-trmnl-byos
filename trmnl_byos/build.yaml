# Base image per arch. Playwright's images are multi-arch, so the same tag serves both.
# This is what makes the Supervisor build from the Playwright base (Chromium + deps)
# instead of substituting a default base.
build_from:
  amd64: mcr.microsoft.com/playwright/python:v1.61.0-noble
  aarch64: mcr.microsoft.com/playwright/python:v1.61.0-noble
